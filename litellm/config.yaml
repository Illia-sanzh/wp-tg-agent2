# LiteLLM Proxy Configuration
# ─────────────────────────────────────────────────────────────────────────────
# This file maps friendly model names to actual AI providers.
# The agent calls LiteLLM using the OpenAI-compatible API, which completely
# avoids the 401 issue that occurs when the Anthropic SDK is used directly.
#
# HOW THE 401 FIX WORKS:
#   Agent → LiteLLM (OpenAI /v1/chat/completions)
#                ↓
#         LiteLLM → Anthropic/OpenAI/etc (real API key never leaves LiteLLM)
#
# The agent never touches Anthropic directly, so no 401 from Anthropic.
# ─────────────────────────────────────────────────────────────────────────────

model_list:

  # ── Anthropic / Claude ────────────────────────────────────────────────────
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 16384

  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 16384

  # ── OpenAI / ChatGPT ──────────────────────────────────────────────────────
  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  # ── DeepSeek ──────────────────────────────────────────────────────────────
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── Google Gemini ─────────────────────────────────────────────────────────
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro-preview-03-25
      api_key: os.environ/GEMINI_API_KEY

  # ── OpenRouter (access to ALL models via one API key) ─────────────────────
  # Set OPENROUTER_API_KEY in .env. Browse all slugs at https://openrouter.ai/models
  # Only OPENROUTER_API_KEY is needed — no separate provider keys required.
  #
  # Claude via OpenRouter (openrouter/anthropic/<slug>)
  # If a slug returns "model not found", check the exact ID at openrouter.ai/models.
  - model_name: openrouter/claude-sonnet-4-6
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 16384

  - model_name: openrouter/claude-opus-4-6
    litellm_params:
      model: openrouter/anthropic/claude-opus-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      max_tokens: 16384

  # GPT via OpenRouter
  - model_name: openrouter/gpt-5.4-mini
    litellm_params:
      model: openrouter/openai/gpt-5.4-mini
      api_key: os.environ/OPENROUTER_API_KEY

  # Gemini via OpenRouter
  - model_name: openrouter/gemini-2.5-flash
    litellm_params:
      model: openrouter/google/gemini-2.5-flash
      api_key: os.environ/OPENROUTER_API_KEY

  # DeepSeek via OpenRouter
  - model_name: openrouter/deepseek-chat
    litellm_params:
      model: openrouter/deepseek/deepseek-chat-v3-0324
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/deepseek-r1
    litellm_params:
      model: openrouter/deepseek/deepseek-r1
      api_key: os.environ/OPENROUTER_API_KEY

  # Other popular open-source models via OpenRouter
  - model_name: openrouter/llama-3.3-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/mistral-large
    litellm_params:
      model: openrouter/mistralai/mistral-large-2411
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/gemma-3-27b
    litellm_params:
      model: openrouter/google/gemma-3-27b-it
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter/qwq-32b
    litellm_params:
      model: openrouter/qwen/qwq-32b
      api_key: os.environ/OPENROUTER_API_KEY

# ─────────────────────────────────────────────────────────────────────────────
# General settings
# ─────────────────────────────────────────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

  # Budget guard — prevents runaway spend
  max_budget: "${MONTHLY_BUDGET_USD:-20}"
  budget_duration: "1mo"

  # Logging
  drop_params: true          # Don't log params (hides API keys from logs)
  set_verbose: false

  # Fallback: if primary provider fails, try the fallback model
  # (set DEFAULT_MODEL and FALLBACK_MODEL in .env)

router_settings:
  # Retry failed requests up to 2 times before falling back
  num_retries: 2
  retry_after: 5

  # Fallbacks are handled by the agent (which probes models on startup
  # and only calls ones with valid API keys). LiteLLM fallbacks would
  # blindly try models with missing/expired keys, causing error cascades.

litellm_settings:
  # Request timeout in seconds
  request_timeout: 300
  # Allow empty API keys (LiteLLM will just skip that provider)
  drop_params: true

  # ── Response caching ─────────────────────────────────────────────────────
  # Cache identical requests in memory (TTL = 1 hour).
  # Saves money when the same question is asked multiple times (e.g. forum FAQs).
  cache: true
  cache_params:
    type: "local"            # in-memory cache (no Redis needed)
    ttl: 3600                # cache responses for 1 hour

  # ── Prompt caching (Anthropic) ───────────────────────────────────────────
  # Anthropic caches static prompt prefixes (system prompt) across calls.
  # Same system prompt = 90% discount on input tokens for cached portion.
  # This is automatic when using anthropic/ models — LiteLLM passes it through.
  cache_control_injection_for_anthropic: true
